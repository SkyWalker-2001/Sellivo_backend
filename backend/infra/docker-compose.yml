name: sellivo

services:
  postgres:
    image: postgres:16-alpine
    container_name: sellivo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sellivo
      POSTGRES_PASSWORD: sellivo
      POSTGRES_DB: sellivo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sellivo -d sellivo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sellivo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
